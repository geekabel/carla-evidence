name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-test-pypi:
    name: Publish to Test PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/carla-evidence
    permissions:
      id-token: write  # required for Test PyPI trusted-publisher OIDC
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # No password / token: trusted-publisher OIDC is configured at
          # https://test.pypi.org/manage/account/publishing/

  smoke-test-test-pypi:
    name: Smoke-test pip install from Test PyPI
    needs: publish-test-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install from Test PyPI in a fresh venv
        # Test PyPI lags PyPI for transitive deps (numpy, scipy, pydantic);
        # use --extra-index-url so they resolve from real PyPI.
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/pip install --upgrade pip
          .venv-smoke/bin/pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "carla-evidence==${GITHUB_REF_NAME#v}"

      - name: Smoke import + tutorial-1 code path
        run: |
          .venv-smoke/bin/python -c '
          from carla_evidence import Frame, MassFunction
          from carla_evidence.combination import dempster, pcr5
          theta = Frame.of("car", "truck", "pedestrian")
          m1 = MassFunction(theta, {("car",): 0.6, theta.omega: 0.4})
          m2 = MassFunction(theta, {("car", "truck"): 0.5, theta.omega: 0.5})
          d = dempster(m1, m2)
          p = pcr5(m1, m2)
          assert d.bel(("car",)) > 0
          assert p.bel(("car",)) > 0
          print(f"smoke-test ok: dempster={d}, pcr5={p}")
          '

  publish-pypi:
    name: Publish to PyPI (gated)
    # Pre-1.0 we DO NOT auto-publish to real PyPI; that's reserved for v0.5.0+
    # once the API stabilises (carla-evidence-architecture.md §11). Manually
    # remove the `if: false` line below to enable a future production release.
    if: false
    needs: smoke-test-test-pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/carla-evidence
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: smoke-test-test-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          # Mark pre-1.0 tags as pre-release to keep the "Latest" sticker off
          # of v0.X tags until v1.0.0 ships.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}

  # Zenodo archiving is configured at the repository level (Settings →
  # Integrations → Zenodo). When the GitHub release above is published, the
  # Zenodo webhook archives the source tarball and mints a fresh DOI. Update
  # CITATION.cff with the new DOI in the v0.2.1 patch.
