name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff (lint)
        run: ruff check src tests benchmarks

      - name: ruff-format (check only)
        run: ruff format --check src tests benchmarks

      - name: mypy (strict)
        run: mypy src/carla_evidence

  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest (unit + property + regression)
        # shell: bash forces Git Bash on Windows runners; the default PowerShell
        # rejects the `\` line-continuation syntax used below.
        shell: bash
        run: |
          pytest tests/unit tests/property tests/regression \
            --cov=carla_evidence \
            --cov-branch \
            --cov-report=xml \
            -n auto

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  property-tests-deep:
    name: Hypothesis CI profile (500 examples)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest property suite, hypothesis profile=ci
        run: |
          pytest tests/property -n auto -v
        env:
          HYPOTHESIS_PROFILE: ci

  benchmark:
    name: Benchmark regression check
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          pytest benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark.json \
            --override-ini="testpaths=benchmarks"

      - uses: actions/upload-artifact@v5
        with:
          name: benchmark-${{ github.sha }}
          path: benchmark.json
          retention-days: 30

      # Once a baseline is committed (post-v0.2.0), enable regression alerts:
      # - uses: benchmark-action/github-action-benchmark@v1
      #   with:
      #     tool: pytest
      #     output-file-path: benchmark.json
      #     alert-threshold: '120%'
      #     fail-on-alert: true
      #     github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
