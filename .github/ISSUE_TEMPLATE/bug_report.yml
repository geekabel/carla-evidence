name: Bug report
description: Report a numerical, API, or runtime bug
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Before submitting, please make sure you have read
        the relevant section of `CLAUDE.md` (e.g. m(empty-set) semantics, K=1 handling,
        PCR5-vs-PCR6 in multi-source, Jousselme metric quirks).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: |
        A short, self-contained script that triggers the bug. Prefer a property-based
        test (hypothesis) when applicable.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: |
        Describe what you expected. If the expected output comes from the literature,
        please cite the reference (paper, page, equation).
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What the library produced (full traceback if any).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: carla-evidence version
      placeholder: "e.g. 0.1.0 or commit sha"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.6"
    validations:
      required: true

  - type: input
    id: numpy
    attributes:
      label: numpy / scipy versions
      placeholder: "e.g. numpy 1.26.4, scipy 1.13.1"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 22.04, macOS 14.5, Windows 11"

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, environment quirks, suspicions, related issues.
